<p-toolbar styleClass="p-mb-4">
   <div class="p-toolbar-group-left">
      <span class="p-toolbar-text p-mr-3"
            style="font-size: 1.5em; font-weight: bold;">BasketBall Scouting</span>
      <ng-container *ngIf="authService.isAuthenticated()">
         <button pButton
                 type="button"
                 label="Eventi"
                 class="p-button-text ml-3 mnu-button"
                 routerLink="/"
                 style="margin-left: 10px !important;"
                 [raised]="true"></button>

         <div class="card flex justify-content-center">
            <p-menu #tabelleMenu
                    [model]="mnuTabelle"
                    [popup]="true"/>
            <button pButton
                    type="button"
                    label="Tabelle"
                    class="p-button-text ml-3 mnu-button"
                    (click)="tabelleMenu.toggle($event)"
                    [raised]="true"></button>
         </div>

         <button pButton
                 type="button"
                 label="Impostazioni"
                 class="p-button-text ml-3 mnu-button"
                 routerLink="/settings"
                 [raised]="true"></button>
      </ng-container>
   </div>
   <ng-container *ngIf="authService.isAuthenticated()">
      <div class="p-toolbar-group-right">
         <p style="margin-right: 15px;">Utente: {{loggedUser.nome}} ({{loggedUser.ruolo}}) </p>
         <button pButton
                 label="Logout"
                 icon="pi pi-sign-out"
                 (click)="logout()"
                 [raised]="true"></button>
      </div>
   </ng-container>
</p-toolbar>

<div id="router-container"
     class="router-container">
   <router-outlet></router-outlet>
</div>

<div class="app-footer">
   <p style="white-space: pre-wrap !important;">{{appTitle}} {{appVersion}}{{separatore}}{{appCopyrights}}</p>
</div>
