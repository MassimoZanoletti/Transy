<div id="main_container">

   <div class="card flex justify-content-start"
        id="div-page-header">
      <p-card [style]="{ width: '100%' }"
              contentStyleClass="card-contenuto-ridotto">
         <div style="display: flex; align-items: center;">
            <h2 style="margin-left: 15px; margin-right: 30px; margin-bottom: 0px; margin-top: 0px; padding-bottom: 0px; padding-top: 0px;">Log</h2>
            <p-button
               class="p-button-table"
               icon="pi pi-refresh"
               severity="secondary"
               pTooltip="Refresh"
               tooltipPosition="top"
               (click)="LoadData()"
            ></p-button>
         </div>
      </p-card>
   </div>

   <!--
   <div *ngIf="isLoading" class="card flex justify-content-center">
      -->
   <p-blockUI [blocked]="isLoading">
      <p-progressSpinner></p-progressSpinner>
   </p-blockUI>

   <div id="div-tabella-bottoni">
      <div class="card"
           id="div-tabella">
         <p-table
            class="custom-header-table"
            styleClass="p-datatable-gridlines"
            [scrollable]="true"
            [scrollHeight]="scrollHeight"
            [value]="tblData"
            dataKey="id"
            [tableStyle]="{ 'min-width': '50rem' }">
            <ng-template pTemplate="header">
               <tr>
                  <th style="width: 85px;">Id</th>
                  <th style="width: 200px;">DataOra</th>
                  <th style="width: 180px;">Utente</th>
                  <th>Mess</th>
               </tr>
            </ng-template>
            <ng-template pTemplate="body"
                         let-elemento
                         let-rowIndex="rowIndex">
               <tr>
                  <td><span style="font-size: 0.6em;">{{ elemento.id }}</span></td>
                  <td>{{ elemento.datetime }}</td>
                  <td>({{ elemento.user_id }}) {{ elemento.user}}</td>
                  <td>{{ elemento.description }}</td>
               </tr>
            </ng-template>
         </p-table>
      </div>
   </div>
</div>
