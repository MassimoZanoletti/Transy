<div class="the-container">
   <p-card header="{{operazione}}Ruolo">
      <ng-template pTemplate="content">
         <div class="form-group">
            <label for="nome">Ruolo:</label>
            <input type="text"
                   id="ruolo"
                   [(ngModel)]="ruolo"
                   pInputText
                   required
                   #theError="ngModel"/>
         </div>

         <div class="form-group">
            <label for="nome">Attributo:</label>
            <p-inputNumber
               [(ngModel)]="attributo"
               mode="decimal"
               [showButtons]="true"
               inputId="attributo"/>
         </div>

         <div *ngIf="theError.invalid && theError.touched" class="error-message">{{ errorMessage }}</div>
      </ng-template>

      <ng-template pTemplate="footer">
         <div class="footer-buttons">
            <button
               pButton
               type="button"
               label="Annulla"
               class="p-button-secondary"
               (click)="Annulla()"
            ></button>
            <button
               pButton
               type="button"
               label="OK"
               class="p-button-primary"
               (click)="Salva()"
            ></button>
         </div>
      </ng-template>
   </p-card>
</div>
