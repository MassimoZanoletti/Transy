<div class="the-container">
   <p-card header="{{operazione}}Stagione">
      <ng-template pTemplate="content">
         <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text"
                   id="nome"
                   [(ngModel)]="nome"
                   pInputText
                   required
                   #theError="ngModel"/>
         </div>

         <div class="form-group horizontal">
            <label for="datainizio">Data Inizio:</label>
            <p-calendar
               [(ngModel)]="dataInizio"
               [showIcon]="true"
               [showOnFocus]="false"
               inputId="datainizio"
               dateFormat="dd/mm/yyyy"
            ></p-calendar>
         </div>

         <div class="form-group horizontal">
            <label for="datafine">Data Fine:</label>
            <p-calendar
               [(ngModel)]="dataFine"
               [showIcon]="true"
               [showOnFocus]="false"
               inputId="datafine"
               dateFormat="dd/mm/yyyy"
            ></p-calendar>
         </div>

         <div *ngIf="theError.invalid && theError.touched" class="error-message">{{ errorMessage }}</div>
      </ng-template>

      <ng-template pTemplate="footer">
         <div class="footer-buttons">
            <button
               pButton
               type="button"
               label="Annulla"
               class="p-button-secondary"
               (click)="Annulla()"
            ></button>
            <button
               pButton
               type="button"
               label="OK"
               class="p-button-primary"
               (click)="Salva()"
            ></button>
         </div>
      </ng-template>
   </p-card>
</div>
